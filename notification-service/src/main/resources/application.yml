server:
  port: 8084

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/atm_security_system
    username: root
    password: MySQL@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
  
  mail:
    host: smtp.gmail.com
    port: 587
    username: mock@atmsecurity.com
    password: mockpassword
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# WebSocket Configuration
websocket:
  endpoint: /ws-alerts
  allowed-origins: http://localhost:3000,http://localhost:8080
  heartbeat:
    interval: 30000  # 30 seconds

# Notification Configuration
notification:
  email:
    from: mock@atmsecurity.com
    templates:
      alert-subject: "🚨 ATM Security Alert: {severity}"
      escalation-subject: "⚠️ Alert Escalated: {alertId}"
  websocket:
    max-sessions-per-user: 3
    session-timeout: 300000  # 5 minutes

# Logging
logging:
  level:
    com.atm.notification: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.kafka: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
