<!DOCTYPE html>
<html>
<head>
    <title>WebSocket Test - Notification Service</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
</head>
<body>
    <h1>WebSocket Test - Notification Service</h1>
    <div>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="sendTestNotification()">Send Test Notification</button>
    </div>
    
    <div>
        <h3>Connection Status:</h3>
        <p id="status">Disconnected</p>
    </div>
    
    <div>
        <h3>Messages:</h3>
        <div id="messages"></div>
    </div>

    <script>
        let stompClient = null;
        let connected = false;

        function connect() {
            const socket = new SockJS('http://localhost:8084/ws-alerts?token=user-1');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function (frame) {
                setConnected(true);
                console.log('Connected: ' + frame);
                
                // Subscribe to personal notifications
                stompClient.subscribe('/user/queue/notifications', function (message) {
                    showMessage('Personal Notification: ' + message.body);
                });
                
                // Subscribe to broadcast alerts
                stompClient.subscribe('/topic/alerts', function (message) {
                    showMessage('Broadcast Alert: ' + message.body);
                });
            });
        }

        function disconnect() {
            if (stompClient !== null) {
                stompClient.disconnect();
            }
            setConnected(false);
            console.log("Disconnected");
        }

        function setConnected(isConnected) {
            connected = isConnected;
            document.getElementById('status').innerText = isConnected ? 'Connected' : 'Disconnected';
        }

        function showMessage(message) {
            const messagesDiv = document.getElementById('messages');
            const messageElement = document.createElement('div');
            messageElement.style.padding = '5px';
            messageElement.style.border = '1px solid #ccc';
            messageElement.style.margin = '2px';
            messageElement.innerHTML = '<strong>' + new Date().toLocaleTimeString() + '</strong>: ' + message;
            messagesDiv.appendChild(messageElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function sendTestNotification() {
            if (!connected) {
                alert('Please connect first!');
                return;
            }
            
            // Send a test notification via REST API
            fetch('http://localhost:8084/test/send-sample', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                showMessage('Test notification sent: ' + JSON.stringify(data));
            })
            .catch(error => {
                showMessage('Error sending notification: ' + error);
            });
        }
    </script>
</body>
</html>
