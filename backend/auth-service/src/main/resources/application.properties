server.port=8081

# Spring Boot Application Configuration
spring.application.name=auth-service

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/atm_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=MySQL@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:8080,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Redis Configuration - Temporarily disabled
# spring.data.redis.host=localhost
# spring.data.redis.port=6379
# spring.data.redis.password=
# spring.data.redis.timeout=2000ms
# spring.data.redis.lettuce.pool.max-active=8
# spring.data.redis.lettuce.pool.max-idle=8
# spring.data.redis.lettuce.pool.min-idle=0
# spring.data.redis.lettuce.pool.max-wait=-1ms

# Session Configuration - Temporarily disabled
# spring.session.store-type=redis
# spring.session.timeout=30m
# spring.session.redis.namespace=atm:auth:sessions

# JWT Configuration
atm.app.jwtSecret=atmSecuritySecretKeyForJWTTokenGeneration
atm.app.jwtExpirationMs=86400000
atm.app.jwtRefreshExpirationMs=604800000

# Account Lockout Configuration
atm.app.maxLoginAttempts=5
atm.app.lockoutDurationMinutes=15

# Rate Limiting Configuration
atm.app.rateLimit.requestsPerMinute=100
atm.app.rateLimit.requestsPerHour=1000
atm.app.rateLimit.requestsPerDay=10000
atm.app.rateLimit.cleanupIntervalMinutes=1

# Logging
logging.level.com.atm.auth=DEBUG
logging.level.org.springframework.security=DEBUG
