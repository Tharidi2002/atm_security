server.port=8080

spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# JWT (must match auth-service)
jwt.secret=ATM-Security-JWT-Secret-Key-256bit-Enterprise-Grade-2024!!
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
jwt.issuer=atm-security-system

# Rate limiting
gateway.rate-limit.requests-per-minute=120

# Gateway routes
spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/banks,/api/banks/**

spring.cloud.gateway.routes[1].id=alert-service
spring.cloud.gateway.routes[1].uri=lb://alert-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/alerts,/api/alerts/**,/api/webhooks,/api/webhooks/**

spring.cloud.gateway.routes[2].id=station-service
spring.cloud.gateway.routes[2].uri=lb://station-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/stations,/api/stations/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notifications,/api/notifications/**,/ws/**

spring.cloud.gateway.routes[4].id=ai-service
spring.cloud.gateway.routes[4].uri=http://localhost:8000
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/ai/**

management.endpoints.web.exposure.include=health,info
