server.port=8080

# Spring Cloud Gateway Configuration
spring.application.name=api-gateway

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Gateway Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=station-service
spring.cloud.gateway.routes[1].uri=lb://station-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/stations/**

spring.cloud.gateway.routes[2].id=alert-service
spring.cloud.gateway.routes[2].uri=lb://alert-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/alerts/**

spring.cloud.gateway.routes[3].id=report-service
spring.cloud.gateway.routes[3].uri=lb://report-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reports/**

# CORS Configuration
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-origins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations[/**].allow-credentials=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
