server:
  port: 8082

spring:
  application:
    name: atm-management-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/atm_security_system
    username: root
    password: MySQL@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# ATM Configuration
atm:
  heartbeat:
    timeout: 300000  # 5 minutes in milliseconds
  default:
    firmware-version: "1.0.0"
    status: "ACTIVE"

# Logging
logging:
  level:
    com.atm.atm: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
